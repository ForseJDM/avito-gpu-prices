name: Update GPU Prices

on:
  schedule:
    # Every 4 hours: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: '0 0/4 * * *'
  workflow_dispatch:
    inputs:
      model:
        description: 'Search name (e.g. RTX 4060). Empty = continue from cursor.'
        required: false
        default: ''
      limit:
        description: 'Max models this run (0 = auto)'
        required: false
        type: number
        default: 0
      force:
        description: 'Re-parse all models (ignore existing prices)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet playwright
          playwright install chromium --with-deps

      - name: Fetch prices (incremental)
        run: |
          CMD="python scripts/fetch_prices.py --debug"
          MODEL="${{ github.event.inputs.model }}"
          if [ -n "$MODEL" ]; then
            CMD="$CMD --model \"$MODEL\""
          fi
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ]; then
            CMD="$CMD --limit $LIMIT"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            CMD="$CMD --force"
          fi
          echo "Running: $CMD"
          eval $CMD

      - name: Validate prices
        run: |
          python scripts/validate_prices.py || true

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: debug/
          retention-days: 3
          if-no-files-found: ignore

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet prices.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          PARSED=$(python3 -c "import json; d=json.load(open('prices.json')); print(d.get('parsed_models','?'))")
          TOTAL=$(python3 -c "import json; d=json.load(open('prices.json')); print(d.get('total_models','?'))")
          COV=$(python3 -c "import json; d=json.load(open('prices.json')); print(d.get('coverage_percent','?'))")
          git commit -m "auto: prices $PARSED/$TOTAL ($COV%) ($TIMESTAMP)"
          git push

      - name: Summary
        if: always()
        run: |
          if [ -f prices.json ]; then
            PARSED=$(python3 -c "import json; d=json.load(open('prices.json')); print(d.get('parsed_models','?'))")
            TOTAL=$(python3 -c "import json; d=json.load(open('prices.json')); print(d.get('total_models','?'))")
            COV=$(python3 -c "import json; d=json.load(open('prices.json')); print(d.get('coverage_percent','?'))")
            FAILED=$(python3 -c "import json; d=json.load(open('prices.json')); print(len(d.get('failed_models',[])))")
            echo "## Price Update Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Coverage | ${PARSED}/${TOTAL} (${COV}%) |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed this run | ${FAILED} |" >> $GITHUB_STEP_SUMMARY
          fi
